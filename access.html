  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #fffaf5;
      color: #333;
    }

    .hero {
  position: relative;
  padding: 40px 20px;
  background: #000;
}

.hero-photos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  max-width: 1100px;
  margin: 0 auto 24px;
}

.hero-photos img {
  height: 220px;
  object-fit: cover;
}

    .hero h2 {
      background-color: rgba(0,0,0,0.4);
      display: inline-block;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 28px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h3 {
      color: #f57c00;
      border-bottom: 2px solid #f57c00;
      display: inline-block;
      margin-bottom: 10px;
    }

    .access-info {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background-color: #f57c00;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }

 /* ===== ヒーロー（白背景） ===== */
.hero {
  background-color: #ffffff;
  padding: 40px 20px 60px;
}

/* 写真を重ねる箱 */
.hero-photos-layered {
  position: relative;
  max-width: 1100px;
  margin: 0 auto 24px;
}

/* 大きい写真 */
.hero-photos-layered .photo-main {
  width: 100%;
  max-width: 620px;
  height: auto;
  border-radius: 16px;
  display: block;
}

/* 小さい写真（重ねる） */
.hero-photos-layered .photo-sub {
  position: absolute;
  right: 0;
  bottom: -20px;
  width: 45%;
  max-width: 380px;
  height: auto;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  background: #fff;
}

/* スマホ調整 */
@media (max-width: 768px) {
  .hero-photos-layered .photo-sub {
    position: static;     /* ← スマホでは重ねない */
    width: 100%;
    margin-top: 12px;
  }
}
 
  </style>
</head>
