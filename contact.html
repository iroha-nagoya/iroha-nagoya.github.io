<body>
<div id="header"></div>

 <main>
<div class="container">
    <h1 class="lang"

  お問い合わせ
 </h1>

 <p class="lang"
  data-ja="レッスンや活動内容についてのご質問は、下の「お問い合わせフォーム」から送信してください。ご入力いただいた内容は、スタッフが確認し、メールにてご連絡いたします。"
  data-en="If you have any questions about our lessons or activities, please use the contact form below. Our staff will review your message and contact you by email."

  レッスンや活動内容についてのご質問は、下の「お問い合わせフォーム」から送信してください。<br>
  ご入力いただいた内容は、スタッフが確認し、メールにてご連絡いたします。
 </p>

 <div class="button-wrap">
   <a id="contactBtn" class="contact-btn"
   data-ja="お問い合わせフォームを開く"
   data-en="Open Contact Form"
   data-zh="打开咨询表单"
   data-urlJA="https://docs.google.com/forms/d/e/1FAIpQLScDxFXeTerUpsMJ8LOn1NtE_nb_sJBv48EjlSa2bQPo4sLjpg/viewform?usp=sharing&ouid=104705695837082457581"

 </div>

</main>

<script>
  fetch("header.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
</script>

<footer>
  <p
    data-ja="© 1995 いろは日本語の会"

    © 1995 いろは日本語の会
  </p>
</footer>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("contactBtn");
  const lang = document.documentElement.lang || "ja";

  const textMap = {
    ja: btn.dataset.ja,
    en: btn.dataset.en,
    zh: btn.dataset.zh
  };

  const urlMap = {
    ja: btn.dataset.urlja,
    en: btn.dataset.urlen,
    zh: btn.dataset.urlzh
  };

  btn.textContent = textMap[lang] || textMap.ja;
  btn.href = urlMap[lang] || urlMap.ja;
});
</script>

<script src="lang.js"></script>

<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    attachLangEvents(); // ← 必須
    const lang = localStorage.getItem("lang") || "ja";
    setLang(lang);
  });
</script>
<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>
